name: Android APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  debug:
    name: Build MountainView Android debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Generate Android project
        run: npx expo prebuild --platform android --no-install
        env:
          MOUNTAINVIEW_ENABLE_META_DAT: "false"
      - name: Build debug APK
        run: ./gradlew assembleDebug
        working-directory: mobile/android
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mountainview-ai-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
  release:
    name: Build MountainView Android release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Generate Android project
        run: npx expo prebuild --platform android --no-install
        env:
          MOUNTAINVIEW_ENABLE_META_DAT: "false"
      - name: Build release APK
        run: ./gradlew assembleRelease
        working-directory: mobile/android
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mountainview-ai-release-apk
          path: mobile/android/app/build/outputs/apk/release/*.apk
      - name: Publish latest APK release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mountainview-latest
          name: MountainView AI Latest Android APK
          body: Latest installable MountainView AI Android APK for development testing.
          prerelease: true
          files: mobile/android/app/build/outputs/apk/release/app-release.apk
